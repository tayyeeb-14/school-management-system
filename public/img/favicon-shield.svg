<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="MySchool Portal shield logo">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a2540" stop-opacity="1" />
      <stop offset="1" stop-color="#07162a" stop-opacity="1" />
    </linearGradient>
  </defs>
  <!-- Transparent background intentionally omitted -->
  <!-- Outer shield -->
  <path d="M32 4 L54 14 V30 C54 44 42 56 32 60 C22 56 10 44 10 30 V14 Z" fill="url(#g)"/>

  <!-- Gold border (thin) -->
  <path d="M32 6 L52 15 V30 C52 43 41 54 32 57 C23 54 12 43 12 30 V15 Z" fill="none" stroke="#D4AF37" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Inner emblem: stylized book / M -->
