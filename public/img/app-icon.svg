<?xml version="1.0" encoding="UTF-8"?>
<!-- App icon style SVG (square, transparent background) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="MySchool Portal app icon">
  <defs>
    <linearGradient id="appG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#071b33"/>
      <stop offset="1" stop-color="#031122"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- rounded square background for app icon -->
  <rect x="6" y="6" width="116" height="116" rx="18" ry="18" fill="url(#appG)" filter="url(#shadow)" />

  <!-- shield centered -->
  <g transform="translate(32,16)">
    <path d="M32 4 L54 14 V30 C54 44 42 56 32 60 C22 56 10 44 10 30 V14 Z" fill="#07162a"/>
    <path d="M32 6 L52 15 V30 C52 43 41 54 32 57 C23 54 12 43 12 30 V15 Z" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/>
    <path d="M20 24 L28 18 L36 24 L44 18 L44 40 L20 40 Z" fill="#D4AF37"/>
    <path d="M28 18 L28 36 L36 36 L36 24" fill="#07162a"/>
  </g>

  <!-- subtle gloss -->
  <path d="M20 10 C40 0 88 0 108 10" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="6" stroke-linecap="round"/>
</svg>