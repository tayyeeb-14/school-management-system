<?xml version="1.0" encoding="UTF-8"?>
<!-- Horizontal logo optimized for dark backgrounds -->
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="84" viewBox="0 0 420 84" role="img" aria-label="MySchool Portal logo dark">
  <defs>
    <linearGradient id="goldGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#E4B84A"/>
      <stop offset="1" stop-color="#C6942E"/>
    </linearGradient>
  </defs>

  <!-- Shield emblem (gold on dark) -->
  <g id="shield" transform="translate(8,8)">
    <path d="M40 4 L72 18 V42 C72 62 56 76 40 80 C24 76 8 62 8 42 V18 Z" fill="#071739"/>
    <path d="M40 8 L68 20 V42 C68 58 54 70 40 74 C26 70 12 58 12 42 V20 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1.8" stroke-linejoin="round"/>

    <g transform="translate(6,8)">
      <path d="M20 28 L28 18 L36 28 L48 18 L48 44 L12 44 Z" fill="url(#goldGrad)"/>
      <path d="M28 18 L28 40 L36 40 L36 28" fill="#071739"/>
      <path d="M20 14 L40 6 L60 14 L40 22 Z" fill="url(#goldGrad)" transform="translate(-8,0) scale(0.75)" opacity="0.98"/>
    </g>
  </g>

  <g transform="translate(98,20)">
    <text x="0" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#FFFFFF" letter-spacing="0.6">MySchool</text>
    <text x="0" y="48" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#E4B84A" letter-spacing="1.2">Portal</text>
  </g>
</svg>